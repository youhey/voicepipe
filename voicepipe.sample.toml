[render]
input = "samples/episode.json"
output = "dist/episode.mp3"
workdir = "work/episode"

[preview]
input = "samples/episode.json"
output = "dist/preview.mp3"
workdir = "work/preview"

[upstream]
episode_url = "https://example.com/api/episodes"
# access_token = "replace-with-local-token-or-use-env"

[downstream]
upload_url = "https://example.com/api/episodes"

[storage]
database = "storage/voicepipe.sqlite"
json_dir = "storage/json"
audio_dir = "storage/audio"

[voicevox]
endpoint = "http://127.0.0.1:50021"
speaker = 3

[voice]
speed_scale = 1.2
pitch_scale = 0.0
intonation_scale = 0.9
pause_length_scale = 1.3
volume_scale = 1.0

[audio]
bitrate = "192k"
format = "mp3"
