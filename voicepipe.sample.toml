[render]
input = "samples/episode.json"
output = "dist/episode.mp3"
workdir = "work/episode"

[preview]
input = "samples/episode.json"
output = "dist/preview.mp3"
workdir = "work/preview"

[voicevox]
endpoint = "http://127.0.0.1:50021"
speaker = 3

[voice]
speed_scale = 1.2
pitch_scale = 0.0
intonation_scale = 0.9
pause_length_scale = 1.3
volume_scale = 1.0

[audio]
bitrate = "192k"
format = "mp3"
